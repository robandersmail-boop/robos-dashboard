<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rob OS Command Center</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { text-align: center; padding: 2rem; }
  h1 { font-size: 2.5rem; color: #58a6ff; margin-bottom: 1rem; }
  .subtitle { color: #8b949e; font-size: 1.1rem; margin-bottom: 2rem; }
  .status { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; max-width: 500px; margin: 0 auto; }
  .status p { color: #58a6ff; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Rob OS Command Center</h1>
  <p class="subtitle">Dashboard is being deployed...</p>
  <div class="status">
    <p>Upload the full dashboard file to complete setup.</p>
  </div>
</div>
</body>
</html>
